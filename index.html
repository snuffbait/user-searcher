const proxy="https://corsproxy.io/?";

async function check(name,url){
  try{
    const r=await fetch(proxy+encodeURIComponent(url),{signal:AbortSignal.timeout(8000)});
    return{name,url,ok:r.status===200};
  }catch{
    return{name,url,ok:null};
  }
}

async function go(){
  const user=document.getElementById("user").value.trim();
  if(!user)return;
  const btn=document.getElementById("btn");
  const box=document.getElementById("results");
  btn.disabled=true;
  btn.textContent="searching...";
  box.innerHTML=`<div class=status>checking '${user}' across ${Object.keys(sites).length} sites...</div>`;
  const jobs=Object.entries(sites).map(([n,t])=>check(n,t.replace(/\{\}/g,user)));
  const results=await Promise.all(jobs);
  const found=results.filter(r=>r.ok===true);
  const missed=results.filter(r=>r.ok===false);
  const errors=results.filter(r=>r.ok===null);
  let html=`<div class=status>done — found: ${found.length} &nbsp;|&nbsp; not found: ${missed.length} &nbsp;|&nbsp; errors: ${errors.length}</div>`;
  if(found.length){
    found.forEach(r=>{
      html+=`<div class=hit>[+] <a href="${r.url}" target=_blank rel=noopener>${r.name}</a> — ${r.url}</div>`;
    });
  }else{
    html+=`<div class=miss>nothing found</div>`;
  }
  box.innerHTML=html;
  btn.disabled=false;
  btn.textContent="search";
}

document.getElementById("user").addEventListener("keydown",e=>{if(e.key==="Enter")go()});
